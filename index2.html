<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6efd">
    <title>ParkirPintar - Cari Mobil Jadi Mudah</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">

    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-park { padding: 20px; font-size: 1.2rem; border-radius: 15px; transition: 0.3s; }
        .btn-park:hover { transform: translateY(-3px); }
        .status-badge { border-radius: 50px; padding: 5px 15px; font-size: 0.85rem; }
        .footer-text { font-size: 0.8rem; color: #6c757d; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app" class="container mt-4 mb-5" style="max-width: 450px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary"><i class="fas fa-parking"></i> ParkirPintar</h2>
        <p class="text-muted">Jangan biarkan dirimu tersesat di parkiran.</p>
    </div>

    <div class="card main-card py-3">
        <div class="card-body text-center">
            
            <div v-if="!isParked">
                <div class="mb-4">
                    <i class="fas fa-car-side fa-4x text-light-emphasis"></i>
                </div>
                <h5 class="mb-3">Sudah dapat tempat parkir?</h5>
                <button @click="saveLocation" :disabled="loading" class="btn btn-primary btn-park w-100 shadow">
                    <span v-if="loading" class="spinner-border spinner-border-sm"></span>
                    <i v-else class="fas fa-map-marker-alt me-2"></i> 
                    Simpan Lokasi Sekarang
                </button>
            </div>

            <div v-else>
                <div class="d-flex justify-content-center mb-3">
                    <span class="badge bg-success status-badge">
                        <i class="fas fa-check-circle me-1"></i> Lokasi Terkunci
                    </span>
                </div>

                <div class="bg-light p-3 rounded-4 mb-3 border">
                    <p class="mb-1 text-muted small"><i class="far fa-clock me-1"></i> Waktu Parkir:</p>
                    <h6 class="fw-bold">{{ parkingData.timestamp }}</h6>
                </div>

                <div class="text-start mb-4">
                    <label class="form-label fw-semibold small text-secondary">Detail (Lantai / Blok / Nomor):</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-info-circle text-muted"></i></span>
                        <input v-model="parkingData.detail" @input="updateStorage" 
                               class="form-control border-start-0" 
                               placeholder="Contoh: B2 - Blok C24">
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button @click="openNavigation" class="btn btn-success btn-park shadow">
                        <i class="fas fa-directions me-2"></i> Pandu Saya Kembali
                    </button>
                    
                    <button @click="resetParking" class="btn btn-link text-danger text-decoration-none small">
                        <i class="fas fa-trash-alt me-1"></i> Hapus Data Parkir
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div class="text-center footer-text">
        Dibuat untuk Tugas Kuliah &bull; 2026<br>
        <small>Menggunakan Geolocation API & LocalStorage</small>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const isParked = ref(false);
            const loading = ref(false);
            const parkingData = ref({
                lat: null,
                lng: null,
                detail: '',
                timestamp: ''
            });

            // 1. CEK DATA SAAT LOAD
            onMounted(() => {
                const savedData = localStorage.getItem('parkir_pintar_data');
                if (savedData) {
                    parkingData.value = JSON.parse(savedData);
                    isParked.value = true;
                }
            });

            // 2. FUNGSI SIMPAN LOKASI
            const saveLocation = () => {
                loading.value = true;
                if (!navigator.geolocation) {
                    alert("Browser kamu tidak mendukung GPS.");
                    loading.value = false;
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        parkingData.value.lat = position.coords.latitude;
                        parkingData.value.lng = position.coords.longitude;
                        parkingData.value.timestamp = new Date().toLocaleString('id-ID', { 
                            dateStyle: 'medium', 
                            timeStyle: 'short' 
                        });
                        
                        isParked.value = true;
                        updateStorage();
                        loading.value = false;
                    },
                    (error) => {
                        loading.value = false;
                        alert("Gagal akses lokasi: " + error.message);
                    },
                    { enableHighAccuracy: true }
                );
            };

            // 3. UPDATE LOCAL STORAGE
            const updateStorage = () => {
                localStorage.setItem('parkir_pintar_data', JSON.stringify(parkingData.value));
            };

            // 4. NAVIGASI KE GOOGLE MAPS (Jalan Kaki)
            const openNavigation = () => {
                const lat = parkingData.value.lat;
                const lng = parkingData.value.lng;
                // URL Google Maps untuk navigasi pejalan kaki
                const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`;
                window.open(url, '_blank');
            };

            // 5. RESET DATA
            const resetParking = () => {
                if (confirm("Sudah kembali ke mobil? Data lokasi akan dihapus.")) {
                    localStorage.removeItem('parkir_pintar_data');
                    isParked.value = false;
                    parkingData.value = { lat: null, lng: null, detail: '', timestamp: '' };
                }
            };

            return { isParked, loading, parkingData, saveLocation, updateStorage, openNavigation, resetParking };
        }
    }).mount('#app');

    // Registrasi Service Worker
  if ('service-worker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('Service Worker Terdaftar!'))
        .catch(err => console.log('Gagal daftar SW:', err));
    });
  }
</script>

</body>
</html>
